<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PromptRebel – Bildgenerator</title>
  <meta
    name="description"
    content="Lokale Text-zu-Bild-Experimente direkt im Browser. Kein Backend. Keine API."
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <p class="eyebrow">PROMPTREBEL · LAB</p>
      <h1>Browser Image Generator</h1>
      <p class="subtitle">
        Lokale Text-zu-Bild-Experimente direkt im Browser.
        Kein Backend. Keine API. Nur Browser, WebGPU und Modell-Load.
      </p>
    </header>

    <section class="panel">
      <label for="imagePrompt" class="label">Prompt</label>
      <textarea
        id="imagePrompt"
        class="prompt-input"
        rows="5"
        maxlength="400"
        placeholder="z. B. a comic dog with big eyes, colorful, cartoon style"
      ></textarea>
      <p id="imagePromptCount" class="meta-muted">0 / 400</p>

      <div class="controls">
        <button id="btnLoadImageModelV1" class="btn">Modell laden</button>
        <button id="btnGenerateImage" class="btn" disabled>Generate</button>
        <button id="btnStopImage" class="btn btn-secondary" disabled>Stop</button>
        <button id="btnDownloadImage" class="btn btn-secondary" disabled>Download PNG</button>
        <button id="btnClearImage" class="btn btn-secondary">Clear</button>
      </div>

      <div class="meta">
        <div class="meta-row">
          <span class="meta-label">WebGPU</span>
          <span id="gpuStatus" class="meta-value">Prüfe...</span>
        </div>

        <div class="meta-row">
          <span class="meta-label">Status</span>
          <span id="imageStatus" class="meta-value">Bereit</span>
        </div>

        <div class="progress-container" aria-hidden="true">
          <div id="modelProgressBar" class="progress-bar"></div>
        </div>

        <div class="meta-row">
          <span class="meta-label">Modell</span>
          <span id="imageModelInfo" class="meta-value">Noch nicht geladen</span>
        </div>
      </div>
    </section>

    <section class="output">
      <div class="output-head">
        <h2>Output</h2>
      </div>

      <div id="imageStage" class="image-stage">
        <div id="imagePlaceholder" class="placeholder">
          Noch kein Bild generiert.
        </div>
        <canvas id="imageCanvas" class="result-image hidden"></canvas>
      </div>
    </section>
  </main>

  <script type="module" src="assets/js/image-page.js"></script>
</body>
</html>
