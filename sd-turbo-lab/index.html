<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PromptRebel – SD Turbo Lab</title>

  <meta name="description" content="PromptRebel SD Turbo Lab – lokaler Browser-Bildgenerator." />

  <link rel="stylesheet" href="style.css">
  

  <!-- 🔥 WICHTIG: ONNX Runtime (FEHLERFIX) -->
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2/dist/transformers.min.js"></script>
<script type="module" src="assets/js/sd-turbo-page.js"></script>

</head>

<body>
  <main class="app">

    <header class="hero">
      <p class="eyebrow">PROMPTREBEL · LAB</p>
      <h1>SD Turbo Lab</h1>
      <p class="subtitle">
        Lokaler Bildgenerator im Browser (SD Turbo Testgerüst)
      </p>
    </header>

    <!-- PROMPT -->
    <section class="panel">
      <label for="imagePrompt" class="label">Prompt</label>

      <textarea
        id="imagePrompt"
        rows="5"
        maxlength="400"
        placeholder="z. B. a cute cartoon dog, big round eyes, simple illustration"
      ></textarea>

      <p id="imagePromptCount">0 / 400</p>

      <!-- BUTTONS -->
      <div class="controls">
        <button id="btnLoadModel">Modell laden</button>
        <button id="btnGenerateImage" disabled>Generate</button>
        <button id="btnStopImage" disabled>Stop</button>
        <button id="btnDownloadImage" disabled>Download</button>
        <button id="btnClearImage">Clear</button>
      </div>

      <!-- STATUS -->
      <div class="meta">

        <div>
          <strong>WebGPU:</strong>
          <span id="gpuStatus">Prüfe...</span>
        </div>

        <div>
          <strong>Status:</strong>
          <span id="imageStatus">Bereit</span>
        </div>

        <div class="progress-container">
          <div id="modelProgressBar" class="progress-bar"></div>
        </div>

        <div>
          <strong>Modell:</strong>
          <span id="imageModelInfo">Noch nicht geladen</span>
        </div>

      </div>
    </section>

    <!-- OUTPUT -->
    <section class="output">

      <h2>Output</h2>

      <div class="image-stage">

        <!-- Platzhalter -->
        <div id="imagePlaceholder">
          Noch kein Bild generiert.
        </div>

        <!-- Canvas -->
        <canvas id="imageCanvas" class="hidden"></canvas>

      </div>

    </section>

  </main>

  
  

</body>
</html>
