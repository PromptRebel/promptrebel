<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Web Podcast Lab</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
    }

    .card {
      border: 1px solid rgba(165,243,252,0.2);
      border-radius: 18px;
      padding: 20px;
      background: rgba(15, 23, 42, 0.9);
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    h1, h2 {
      margin-top: 0;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      resize: vertical;
      border-radius: 12px;
      border: 1px solid rgba(148,163,184,0.25);
      background: rgba(2,6,23,0.45);
      color: #e5e7eb;
      padding: 14px;
      box-sizing: border-box;
      outline: none;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    button {
      border: 1px solid rgba(165,243,252,0.35);
      background: transparent;
      color: #e5e7eb;
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .small {
      font-size: 0.9rem;
      opacity: 0.8;
    }

    .panel {
      margin-top: 18px;
      padding: 16px;
      border-radius: 14px;
      background: rgba(2,6,23,0.35);
      border: 1px solid rgba(148,163,184,0.15);
      white-space: pre-wrap;
    }

    select {
      border-radius: 10px;
      padding: 8px 10px;
      background: rgba(2,6,23,0.45);
      color: #e5e7eb;
      border: 1px solid rgba(148,163,184,0.25);
    }

    .status {
      margin-top: 10px;
      color: #a5f3fc;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Mini Web Podcast Lab</h1>
    <p class="small">
      Experimenteller lokaler Podcast-Generator. Textentwurf per KI im Browser, Vorlesen per Browser-Stimme.
      Keine Cloud-Ausführung auf deinem Server.
    </p>

    <h2>V1 – Browser Voice</h2>
    <textarea id="promptInput" maxlength="600" placeholder="Thema oder Stichworte eingeben..."></textarea>

    <div class="row">
      <span id="promptCount" class="small">0 / 600</span>
    </div>

    <div class="row">
      <button id="btnGenerate">Skript erzeugen</button>
      <button id="btnSpeak" disabled>Vorlesen</button>
      <button id="btnPause" disabled>Pausieren</button>
      <button id="btnResume" disabled>Fortsetzen</button>
      <button id="btnStop" disabled>Stop</button>
    </div>

    <div class="row">
      <label for="voiceSelect" class="small">Stimme:</label>
      <select id="voiceSelect"></select>
    </div>

    <div id="status" class="status">Bereit.</div>

    <div id="outputText" class="panel">Hier erscheint der erzeugte Text.</div>
  </div>

  <script type="module" src="../assets/js/podcast-page.js"></script>
</body>
</html>
