<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>RTS World Pro</title>
    <style>
        * { box-sizing: border-box; -webkit-touch-callout: none; -webkit-user-select: none; }
        body { 
            margin: 0; padding: 0; background: #111; color: white; 
            font-family: sans-serif; overflow: hidden; 
            display: flex; flex-direction: column; height: 100vh; 
        }

        #header {
            height: 60px; background: #000; border-bottom: 2px solid #444;
            display: flex; align-items: center; justify-content: space-around;
            flex-shrink: 0; z-index: 10;
        }

        #game-container {
            flex-grow: 1; position: relative; overflow: hidden; background: #2e7d32;
        }
        canvas { display: block; width: 100%; height: 100%; touch-action: none; }

        #action-menu {
            height: 100px; background: #000; border-top: 2px solid gold;
            display: none; /* Wird per JS auf 'flex' gesetzt */
            align-items: center; justify-content: center; gap: 10px;
            flex-shrink: 0; z-index: 10; padding: 10px;
        }

        .stat-item { font-size: 20px; font-weight: bold; }
        button { 
            padding: 10px 15px; background: #fff; border: none; border-radius: 5px;
            font-weight: bold; font-size: 14px; cursor: pointer; color: #000;
        }

        #placement-controls {
            position: absolute; bottom: 120px; right: 20px;
            display: none; gap: 10px; z-index: 20;
        }
        .btn-confirm { background: #2e7d32; color: white; }
        .btn-cancel { background: #c62828; color: white; }
    </style>
</head>
<body>

    <div id="header">
        <div class="stat-item">🪵 <span id="wood-count">0</span></div>
        <div class="stat-item">👨 <span id="pop-count">0/10</span></div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="placement-controls">
            <button id="btn-confirm-build" class="btn-confirm">✅ BAUEN</button>
            <button id="btn-cancel-build" class="btn-cancel">❌ ABBRUCH</button>
        </div>
    </div>

    <div id="action-menu">
        <button id="btn-wood">🪓 HOLZ</button>
        <button id="btn-stop">✋ STOP</button>
        <button id="btn-house">🏠 HAUS (50)</button>
        <button id="btn-lodge">🌲 FORST (100)</button>
    </div>

    <script src="gamestate.js"></script>
    <script src="villager.js"></script>
    <script src="renderer.js"></script>
    <script src="ui.js"></script>
    <script src="main.js"></script>
</body>
</html>
