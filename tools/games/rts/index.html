<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RTS World</title>
    <style>
        body { margin: 0; background: #111; color: white; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        canvas { 
            border: 2px solid #333; 
            background: #2e7d32; 
            touch-action: none; 
            cursor: grab;
            width: 100vw; 
            height: auto; 
        }
        canvas:active { cursor: grabbing; }
        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; }
        .stat { background: rgba(0,0,0,0.8); padding: 8px 12px; margin-bottom: 5px; border-radius: 4px; pointer-events: all; font-weight: bold; border: 1px solid #555; }
        #action-menu, #placement-controls { position: absolute; bottom: 20px; left: 20px; background: rgba(0,0,0,0.9); padding: 15px; border-radius: 10px; border: 2px solid gold; display: none; pointer-events: all; }
        #placement-controls { border-color: lime; left: 20px; bottom: 150px; }
        button { padding: 12px; margin: 5px; cursor: pointer; font-weight: bold; border-radius: 5px; border: 1px solid #999; }
        .btn-confirm { background: #2e7d32; color: white; }
        .btn-cancel { background: #c62828; color: white; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="stat">🪵 Holz: <span id="wood-count">0</span></div>
        <div class="stat">👨 Pop: <span id="pop-count">0/10</span></div>
    </div>

    <!-- Debug Overlay -->
    <div id="debug" style="position:absolute; top:80px; left:10px; background:rgba(0,0,0,0.8); color:lime; padding:8px; border-radius:5px; font-size:12px; pointer-events:none;"></div>

    <div id="action-menu">
        <button id="btn-wood">🪓 HOLZ</button>
        <button id="btn-stop">✋ STOP</button><br>
        <button id="btn-house">🏠 HAUS (50)</button>
        <button id="btn-lodge">🌲 FORST (100)</button>
    </div>
    <div id="placement-controls">
        <button id="btn-confirm-build" class="btn-confirm">✅ BAUEN</button>
        <button id="btn-cancel-build" class="btn-cancel">❌ ABBRUCH</button>
    </div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <script src="gamestate.js"></script>
    <script src="villager.js"></script>
    <script src="renderer.js"></script>
    <script src="ui.js"></script>
    <script src="main.js"></script>
</body>
</html>
