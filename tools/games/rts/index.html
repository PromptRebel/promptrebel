<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>RTS World Mobile</title>
    <style>
        * { box-sizing: border-box; -webkit-touch-callout: none; -webkit-user-select: none; outline: none; }
        html, body { 
            margin: 0; padding: 0; width: 100%; 
            height: 100vh; height: 100dvh; /* Dynamische Höhe für Mobile */
            background: #000; color: white; font-family: sans-serif; overflow: hidden; 
        }

        body { display: flex; flex-direction: column; }

        #header {
            height: 60px; background: #1a1a1a; border-bottom: 2px solid #444;
            display: flex; align-items: center; justify-content: space-around;
            flex-shrink: 0; z-index: 100;
        }

        #game-container {
            flex-grow: 1; position: relative; width: 100%; overflow: hidden; background: #2e7d32;
        }

        canvas { 
            position: absolute; top: 0; left: 0;
            width: 100% !important; height: 100% !important; 
            touch-action: none; display: block;
        }

        #action-menu {
            height: 80px; background: #1a1a1a; border-top: 2px solid gold;
            display: none; /* Wird per JS zu 'flex' */
            align-items: center; justify-content: center; gap: 8px;
            flex-shrink: 0; z-index: 100; padding: 5px;
            padding-bottom: env(safe-area-inset-bottom); /* Fix für iPhone Notch/Balken */
        }

        .stat-item { font-size: 18px; font-weight: bold; }
        button { 
            padding: 8px 12px; background: #f0f0f0; border: none; border-radius: 4px;
            font-weight: bold; font-size: 13px; color: #000; active { background: #bbb; }
        }

        #placement-controls {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: none; gap: 15px; z-index: 150;
        }
    </style>
</head>
<body>

    <div id="header">
        <div class="stat-item">🪵 <span id="wood-count">0</span></div>
        <div class="stat-item">👨 <span id="pop-count">0/10</span></div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="placement-controls">
            <button id="btn-confirm-build" style="background: green; color: white;">✅ BAUEN</button>
            <button id="btn-cancel-build" style="background: red; color: white;">❌ ABBRUCH</button>
        </div>
    </div>

    <div id="action-menu">
        <button id="btn-wood">🪓 HOLZ</button>
        <button id="btn-stop">✋ STOP</button>
        <button id="btn-house">🏠 HAUS</button>
        <button id="btn-lodge">🌲 FORST</button>
    </div>

    <script src="gamestate.js"></script>
    <script src="villager.js"></script>
    <script src="renderer.js"></script>
    <script src="ui.js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
