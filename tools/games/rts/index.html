<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #222; color: white; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        canvas { border: 2px solid #555; background: #348c31; touch-action: none; }
        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; }
        .stat { background: rgba(0,0,0,0.8); padding: 5px 10px; margin-bottom: 5px; border-radius: 4px; pointer-events: all; }
        #action-menu { position: absolute; bottom: 20px; left: 20px; background: rgba(0,0,0,0.9); padding: 10px; border-radius: 8px; border: 2px solid gold; display: none; pointer-events: all; }
        button { padding: 10px; margin: 2px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="stat">🪵 Holz: <span id="wood-count">0</span></div>
        <div class="stat">👨 Pop: <span id="pop-count">0/10</span></div>
    </div>
    <div id="action-menu">
        <button id="btn-wood">🪓 Holz</button>
        <button id="btn-stop">✋ Stop</button><br>
        <button id="btn-house">🏠 Haus (50)</button>
        <button id="btn-lodge">🌲 Forsthaus (100)</button>
    </div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <script src="gamestate.js"></script>
    <script src="villager.js"></script>
    <script src="renderer.js"></script>
    <script src="ui.js"></script>
    <script src="main.js"></script>
</body>
</html>
